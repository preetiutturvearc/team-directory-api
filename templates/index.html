<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Team Directory</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { margin-bottom: 0.25rem; }
  p.sub { color: #666; margin-top: 0; }
  fieldset { margin-bottom: 1.5rem; border: 1px solid #ccc; border-radius: 6px; }
  label { display: block; margin-top: 0.6rem; font-size: 0.9rem; }
  input { width: 100%; padding: 0.4rem; box-sizing: border-box; margin-top: 0.2rem; }
  .row { margin-top: 1rem; }
  button { padding: 0.5rem 1rem; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
  th { background: #f5f5f5; }
  .actions button { margin-right: 0.3rem; font-size: 0.8rem; padding: 0.3rem 0.6rem; }
  .msg { padding: 0.6rem; border-radius: 4px; margin: 0.75rem 0; display: none; }
  .msg.error { background: #fdecea; color: #611a15; display: block; }
  .msg.success { background: #e8f5e9; color: #1b5e20; display: block; }
</style>
</head>
<body>

<h1>Team Directory</h1>


<div id="message" class="msg"></div>
</br>

<fieldset>
  <legend id="form-title">Add Employee</legend>
  <input type="hidden" id="employee_id">
  <label>Name<input id="name" type="text"></label>
  <label>Email<input id="email" type="email"></label>
  <label>Department<input id="department" type="text"></label>
  <label>Role<input id="role" type="text"></label>
  <div class="row">
    <button id="submit-btn" onclick="submitForm()">Create</button>
    <button id="cancel-btn" onclick="resetForm()" style="display:none;">Cancel edit</button>
  </div>
</fieldset>

<table>
  <thead>
    <tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Role</th><th>Actions</th></tr>
  </thead>
  <tbody id="employee-rows"></tbody>
</table>

<script>
const API_KEY = "dev-secret-key";

function showMessage(text, isError) {
  const el = document.getElementById("message");
  el.textContent = text;
  el.className = "msg " + (isError ? "error" : "success");
  setTimeout(() => { el.className = "msg"; }, 4000);
}

async function loadEmployees() {
  const res = await fetch("/employees");
  const employees = await res.json();
  const tbody = document.getElementById("employee-rows");
  tbody.innerHTML = "";
  employees.forEach(emp => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${emp.employee_id}</td>
      <td>${emp.name}</td>
      <td>${emp.email}</td>
      <td>${emp.department}</td>
      <td>${emp.role}</td>
      <td class="actions">
        <button onclick='editEmployee(${JSON.stringify(emp)})'>Edit</button>
        <button onclick="deleteEmployee('${emp.employee_id}')">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function editEmployee(emp) {
  document.getElementById("employee_id").value = emp.employee_id;
  document.getElementById("name").value = emp.name;
  document.getElementById("email").value = emp.email;
  document.getElementById("department").value = emp.department;
  document.getElementById("role").value = emp.role;
  document.getElementById("form-title").textContent = "Edit Employee";
  document.getElementById("submit-btn").textContent = "Update";
  document.getElementById("cancel-btn").style.display = "inline-block";
}

function resetForm() {
  document.getElementById("employee_id").value = "";
  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("department").value = "";
  document.getElementById("role").value = "";
  document.getElementById("form-title").textContent = "Add Employee";
  document.getElementById("submit-btn").textContent = "Create";
  document.getElementById("cancel-btn").style.display = "none";
}

async function submitForm() {
  const employeeId = document.getElementById("employee_id").value;
  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    department: document.getElementById("department").value,
    role: document.getElementById("role").value,
  };

  const isUpdate = !!employeeId;
  const url = isUpdate ? `/employees/${employeeId}` : "/employees";
  const method = isUpdate ? "PUT" : "POST";

  const res = await fetch(url, {
    method,
    headers: { "Content-Type": "application/json", "X-API-Key": API_KEY },
    body: JSON.stringify(payload),
  });
  const body = await res.json();

  if (!res.ok) {
    showMessage(body.error || "Something went wrong", true);
    return;
  }

  showMessage(isUpdate ? "Employee updated" : "Employee created", false);
  resetForm();
  loadEmployees();
}

async function deleteEmployee(employeeId) {
  if (!confirm("Delete this employee?")) return;
  const res = await fetch(`/employees/${employeeId}`, {
    method: "DELETE",
    headers: { "X-API-Key": API_KEY },
  });
  if (res.status === 204) {
    showMessage("Employee deleted", false);
    loadEmployees();
  } else {
    const body = await res.json();
    showMessage(body.error || "Delete failed", true);
  }
}

loadEmployees();
</script>
</body>
</html>
